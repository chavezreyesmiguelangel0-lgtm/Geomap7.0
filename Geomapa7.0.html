<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVisor Perú Pro - Geología 100k</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; z-index: 0; background: #f8fafc; }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; }
        .custom-loader { border: 2px solid #f3f3f3; border-top: 2px solid #ef4444; border-radius: 50%; width: 14px; height: 14px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const INGEMMET_REST_URL = 'https://geocatmin.ingemmet.gob.pe/arcgis/rest/services/SERV_GEOLOGIA_100K_INTEGRADA/MapServer';

        const Icons = {
            Search: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Layers: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>,
            Navigation: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>,
            Move: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>,
            Lock: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        // Proxy con Falla Rápida (4s) para máxima velocidad
        const fetchWithResilience = async (url, timeoutMs = 4000) => {
            const proxies = [
                (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
                (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}&_t=${Date.now()}`,
                (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
            ];
            let lastError = null;
            for (const proxyFn of proxies) {
                try {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), timeoutMs);
                    const response = await fetch(proxyFn(url), { signal: controller.signal });
                    clearTimeout(id);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    return typeof data === 'string' ? JSON.parse(data) : data;
                } catch (err) { lastError = err; }
            }
            throw lastError || new Error('Error');
        };

        function App() {
            const mapRef = useRef(null);
            const [isLocating, setIsLocating] = useState(false);
            const [activeBaseLayer, setActiveBaseLayer] = useState('osm');
            const [searchQuery, setSearchQuery] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [isSearching, setIsSearching] = useState(false);
            const [isMovementEnabled, setIsMovementEnabled] = useState(true);

            // Consulta Ultra-Optimizada
            const fetchGeologyInfo = useCallback(async (latlng) => {
                const params = new URLSearchParams({
                    geometry: `${latlng.lng},${latlng.lat}`,
                    geometryType: 'esriGeometryPoint',
                    sr: '4326',
                    layers: 'visible:0', // DIRECTO A LA CAPA GEOLÓGICA
                    tolerance: '2',      // RADIO MÍNIMO
                    mapExtent: `${latlng.lng-0.01},${latlng.lat-0.01},${latlng.lng+0.01},${latlng.lat+0.01}`,
                    imageDisplay: '100,100,96', // CONTEXTO MÍNIMO
                    f: 'json'
                });
                try {
                    const data = await fetchWithResilience(`${INGEMMET_REST_URL}/identify?${params.toString()}`);
                    if (data.results && data.results.length > 0) {
                        const res = data.results[0];
                        const unidad = res.attributes.UNIDAD || res.attributes.NM_UNIDAD || 'N/A';
                        return `
                            <div class="p-3 min-w-[170px] bg-white">
                                <h3 class="font-bold text-red-600 border-b border-red-100 mb-2 pb-1 text-[10px] uppercase italic">Unidad Geológica</h3>
                                <p class="text-xs text-slate-800 font-bold leading-tight">${unidad}</p>
                                <div class="mt-2 pt-1 border-t border-slate-100 text-[7px] text-slate-400 font-bold uppercase tracking-tighter">INGEMMET 100k • REST API</div>
                            </div>
                        `;
                    }
                    return `<div class="p-3 text-xs text-center text-slate-500">Sin datos geológicos</div>`;
                } catch (e) { return `<div class="p-3 text-xs italic text-red-500">Error de conexión</div>`; }
            }, []);

            useEffect(() => {
                if (!mapRef.current) return;
                const map = mapRef.current;
                const actions = ['dragging', 'touchZoom', 'doubleClickZoom', 'scrollWheelZoom', 'boxZoom', 'keyboard'];
                actions.forEach(a => isMovementEnabled ? map[a].enable() : map[a].disable());
            }, [isMovementEnabled]);

            useEffect(() => {
                const map = L.map('map', { center: [-9.19, -75.01], zoom: 6, zoomControl: false });
                mapRef.current = map;
                const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' }).addTo(map);
                const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });
                const geology = L.tileLayer('https://geocatmin.ingemmet.gob.pe/arcgis/rest/services/SERV_GEOLOGIA_100K_INTEGRADA/MapServer/tile/{z}/{y}/{x}', { attribution: 'INGEMMET', opacity: 0.8, maxZoom: 19 });
                
                L.control.layers({ "Calles": osm, "Satélite": satellite, "Geología": geology }, {}, { position: 'topright', collapsed: false }).addTo(map);
                L.control.scale({ metric: true, imperial: false, position: 'bottomleft' }).addTo(map);
                L.control.zoom({ position: 'topleft' }).addTo(map);

                map.on('baselayerchange', e => setActiveBaseLayer(e.name === "Geología" ? 'geology' : 'osm'));
                map.on('click', async e => {
                    if (map.hasLayer(geology)) {
                        const popup = L.popup().setLatLng(e.latlng).setContent('<div class="p-3 flex items-center gap-2 text-xs font-medium text-slate-500"><div class="custom-loader"></div> Consultando...</div>').openOn(map);
                        const content = await fetchGeologyInfo(e.latlng);
                        popup.setContent(content);
                    }
                });
                return () => map.remove();
            }, [fetchGeologyInfo]);

            // Autocompletado Nominatim
            useEffect(() => {
                if (searchQuery.length < 3) { setSuggestions([]); setIsDropdownOpen(false); return; }
                const timer = setTimeout(async () => {
                    setIsSearching(true);
                    try {
                        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQuery)}&countrycodes=pe&limit=6`);
                        const d = await r.json();
                        setSuggestions(d);
                        setIsDropdownOpen(true);
                    } catch (e) {} finally { setIsSearching(false); }
                }, 400);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            return (
                <div className="relative h-screen w-full overflow-hidden">
                    <div id="map"></div>
                    
                    {/* Buscador */}
                    <div className="absolute bottom-[136px] left-4 z-[1010] w-[280px]">
                        <div className="bg-white/95 backdrop-blur-md shadow-xl rounded-xl border border-slate-200 flex items-center p-1.5 gap-2">
                            <div className="pl-2 text-slate-400">{isSearching ? <div className="custom-loader"></div> : <Icons.Search />}</div>
                            <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Buscar en Perú..." className="flex-1 bg-transparent border-none outline-none py-1 text-[12px] font-medium" />
                        </div>
                        {isDropdownOpen && suggestions.length > 0 && (
                            <ul className="absolute bottom-full mb-2 w-full bg-white/95 backdrop-blur-md shadow-2xl rounded-xl border border-slate-200 max-h-[250px] overflow-y-auto custom-scroll">
                                {suggestions.map((s, i) => (
                                    <li key={i} onClick={() => { mapRef.current.flyTo([s.lat, s.lon], 15); setSearchQuery(s.display_name); setIsDropdownOpen(false); L.marker([s.lat, s.lon]).addTo(mapRef.current).bindPopup(`<b>${s.display_name.split(',')[0]}</b>`).openPopup(); }} className="px-4 py-3 text-[11px] hover:bg-red-50 cursor-pointer border-b border-slate-50 last:border-none">
                                        <span className="font-bold block truncate">{s.display_name.split(',')[0]}</span>
                                        <span className="text-[9px] text-slate-400 block truncate">{s.display_name.split(',').slice(1,3).join(',')}</span>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>

                    {/* Cabecera */}
                    <header className="absolute bottom-4 left-4 z-[1000] bg-white/95 backdrop-blur-md shadow-xl rounded-xl border border-slate-200 flex items-center px-3 gap-3 w-[280px] h-[46px]">
                        <div className="bg-red-600 rounded-lg w-[32px] h-[32px] flex items-center justify-center text-white shadow-lg shadow-red-200"><Icons.Layers /></div>
                        <div>
                            <h1 className="text-slate-900 font-bold text-[12px] leading-tight">GeoVisor Perú Pro</h1>
                            <p className="text-slate-500 text-[9px] uppercase font-bold tracking-wider">Geología 100k • INGEMMET</p>
                        </div>
                    </header>

                    {/* Botones Flotantes */}
                    <div className="absolute bottom-[110px] right-4 z-[1000] flex flex-col gap-3">
                        <button onClick={() => setIsMovementEnabled(!isMovementEnabled)} className={`flex items-center gap-2 px-4 py-2.5 rounded-full shadow-xl transition-all border ${isMovementEnabled ? 'bg-white text-slate-600 border-slate-200' : 'bg-slate-900 text-white border-slate-800'}`}>
                            {isMovementEnabled ? <Icons.Move /> : <Icons.Lock />}
                            <span className="text-[10px] font-bold uppercase">{isMovementEnabled ? 'Móvil' : 'Bloqueado'}</span>
                        </button>
                        <button onClick={() => { setIsLocating(true); navigator.geolocation.getCurrentPosition(p => { mapRef.current.flyTo([p.coords.latitude, p.coords.longitude], 16); setIsLocating(false); }, () => setIsLocating(false)); }} className="bg-red-600 text-white flex items-center gap-2 px-4 py-2.5 rounded-full shadow-xl">
                            {isLocating ? <div className="custom-loader !border-white"></div> : <Icons.Navigation />}
                            <span className="text-[10px] font-bold uppercase">Ubicarme</span>
                        </button>
                    </div>

                    {/* Indicador de Modo */}
                    <div className="absolute bottom-[64px] left-4 z-[1000] bg-white/95 px-4 py-2 rounded-full text-[10px] font-bold uppercase border border-slate-200 shadow-lg flex items-center gap-2">
                        <div className={`w-2 h-2 rounded-full animate-pulse ${activeBaseLayer === 'geology' ? 'bg-red-500' : 'bg-slate-400'}`} />
                        <span className={activeBaseLayer === 'geology' ? 'text-red-600' : 'text-slate-600'}>
                            {activeBaseLayer === 'geology' ? 'Modo Geológico Activo' : 'Modo Navegación'}
                        </span>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
